<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — Ajout de castings</title>
  <style>
    :root{
      --bg:#0f1117;
      --panel:#171c25;
      --panel2:#1d2430;
      --line:#2f3849;
      --text:#f5f7fb;
      --muted:#a8b1c3;
      --accent:#5b8cff;
      --accent2:#13c296;
      --danger:#ff5c7c;
      --radius:20px;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --max:1180px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(91,140,255,.15), transparent 26%),
        radial-gradient(circle at top right, rgba(19,194,150,.12), transparent 24%),
        var(--bg);
      color:var(--text);
    }

    .container{
      width:min(100% - 32px, var(--max));
      margin:auto;
      padding:28px 0 48px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:24px;
    }

    .title h1{
      margin:0 0 8px;
      font-size:clamp(1.8rem, 3vw, 2.8rem);
      letter-spacing:-1px;
    }

    .title p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-weight:700;
    }

    .layout{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:22px;
      align-items:start;
    }

    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:22px;
      box-shadow:var(--shadow);
    }

    .panel h2{
      margin:0 0 16px;
      font-size:1.25rem;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:14px;
    }

    label{
      font-weight:700;
      font-size:.95rem;
    }

    input, textarea, select{
      width:100%;
      background:#11161f;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 14px;
      font:inherit;
      outline:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input:focus, textarea:focus, select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(91,140,255,.15);
    }

    .dropzone{
      border:2px dashed rgba(255,255,255,.16);
      border-radius:18px;
      padding:22px;
      text-align:center;
      background:rgba(255,255,255,.03);
      cursor:pointer;
      transition:.2s ease;
    }

    .dropzone:hover{
      border-color:var(--accent);
      background:rgba(91,140,255,.06);
    }

    .dropzone input{
      display:none;
    }

    .dropzone strong{
      display:block;
      margin-bottom:6px;
      font-size:1rem;
    }

    .preview{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .preview img{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      object-fit:cover;
      max-height:240px;
      background:#11161f;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:14px 18px;
      font-weight:800;
      font-size:.96rem;
      transition:.2s ease;
    }

    button:hover{transform:translateY(-1px)}

    .btn-primary{
      background:linear-gradient(135deg,var(--accent),#7f69ff);
      color:white;
    }

    .btn-secondary{
      background:rgba(255,255,255,.06);
      color:white;
      border:1px solid rgba(255,255,255,.08);
    }

    .btn-danger{
      background:linear-gradient(135deg,var(--danger),#ff7b54);
      color:white;
    }

    .status{
      margin-top:14px;
      min-height:24px;
      font-weight:700;
    }

    .status.ok{color:var(--accent2)}
    .status.err{color:#ff8fa3}

    .list-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:16px;
    }

    .search{
      width:280px;
      max-width:100%;
    }

    .casting-list{
      display:grid;
      gap:14px;
    }

    .casting-item{
      display:grid;
      grid-template-columns:150px 1fr auto;
      gap:14px;
      align-items:center;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px;
    }

    .casting-item img{
      width:150px;
      height:98px;
      object-fit:cover;
      border-radius:14px;
      background:#11161f;
    }

    .casting-item h3{
      margin:0 0 6px;
      font-size:1.05rem;
    }

    .casting-item p{
      margin:0;
      color:var(--muted);
      line-height:1.45;
      font-size:.95rem;
    }

    .mini-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .mini-tags span{
      font-size:.78rem;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:#d7dff0;
    }

    .side-actions{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .empty{
      color:var(--muted);
      padding:20px;
      text-align:center;
      border:1px dashed rgba(255,255,255,.12);
      border-radius:18px;
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 720px){
      .top{
        flex-direction:column;
        align-items:flex-start;
      }

      .casting-item{
        grid-template-columns:1fr;
      }

      .casting-item img{
        width:100%;
        height:auto;
        aspect-ratio:16/10;
      }

      .side-actions{
        flex-direction:row;
      }
    }
  </style>
</head>
<body>

<!-- TON HTML RESTE IDENTIQUE -->

<script>
  const form = document.getElementById("castingForm");
  const imageInput = document.getElementById("imageInput");
  const preview = document.getElementById("preview");
  const statusBox = document.getElementById("status");
  const castingList = document.getElementById("castingList");
  const searchInput = document.getElementById("searchInput");
  const resetBtn = document.getElementById("resetBtn");

  let cachedCastings = [];

  function setStatus(msg, type=""){
    statusBox.textContent = msg;
    statusBox.className = "status " + type;
  }

  imageInput.addEventListener("change", ()=>{
    preview.innerHTML="";
    const file = imageInput.files[0];
    if(!file) return;
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });

  resetBtn.addEventListener("click", ()=>{
    form.reset();
    preview.innerHTML="";
    setStatus("");
  });

  async function loadCastings(){
    const res = await fetch("/api/castings");
    const data = await res.json();
    cachedCastings = data;
    renderList(data);
  }

  function renderList(items){
    if(!items.length){
      castingList.innerHTML = `<div class="empty">Aucun casting</div>`;
      return;
    }

    castingList.innerHTML = items.map((item,i)=>`
      <article class="casting-item">
        <img src="${item.image}">
        <div>
          <h3>${item.title}</h3>
          <p>${item.description_public || ""}</p>
          <div class="mini-tags">
            <span>${item.platform}</span>
            <span>${item.city}</span>
          </div>
        </div>
        <div class="side-actions">
          <button class="btn-danger" onclick="deleteCasting(${i})">Supprimer</button>
        </div>
      </article>
    `).join("");
  }

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const file = imageInput.files[0];
    if(!file){
      setStatus("Ajoute une image","err");
      return;
    }

    const formData = new FormData();
    formData.append("title", title.value);
    formData.append("platform", platform.value);
    formData.append("city", city.value);
    formData.append("description_public", description_public.value);
    formData.append("description_private", description_private.value);
    formData.append("image", file);

    await fetch("/api/add-casting", {
      method:"POST",
      body: formData
    });

    setStatus("Ajout OK","ok");
    form.reset();
    preview.innerHTML="";
    loadCastings();
  });

  async function deleteCasting(index){
    await fetch("/api/delete-casting", {
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify({index})
    });
    loadCastings();
  }

  searchInput.addEventListener("input", ()=>{
    const q = searchInput.value.toLowerCase();
    renderList(cachedCastings.filter(c =>
      c.title.toLowerCase().includes(q) ||
      c.city.toLowerCase().includes(q)
    ));
  });

  loadCastings();
</script>

</body>
</html>
